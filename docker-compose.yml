# docker-compose.yml
services:
  backend:
    build:
      context: ./uploaditin_backend
    ports:
      - "5000:5000"
    env_file: .env
    volumes:
      - ./uploaditin_backend/uploads:/app/uploads
      - ./uploaditin_backend/data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/login_register')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./uploaditin_v2
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
