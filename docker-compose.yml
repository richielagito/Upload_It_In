# docker-compose.yml
# Development: Only backend runs in Docker.
# Frontend runs locally with `npm run dev` for instant hot reload.

services:
  backend:
    build:
      context: ./uploaditin_backend
    ports:
      - "5000:5000"
    env_file:
      - ./uploaditin_backend/.env
    environment:
      - PORT=5000
    volumes:
      - ./uploaditin_backend/uploads:/app/uploads
      - ./uploaditin_backend/data:/app/data

