# docker-compose.yml
services:
  backend:
    build:
      context: ./uploaditin_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - FLASK_SECRET_KEY=dev-secret-key-fixed
    volumes:
      - ./uploaditin_backend/uploads:/app/uploads
      - ./uploaditin_backend/data:/app/data

  frontend:
    build:
      context: ./uploaditin_v2
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend
